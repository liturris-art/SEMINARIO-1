<ion-content class="ion-padding">

<ion-title>Iniciar sesión</ion-title>

<ion-item>
  <ion-label position="floating">Correo</ion-label>
  <ion-input [(ngModel)]="email"></ion-input>
</ion-item>

<ion-item>
  <ion-label position="floating">Contraseña</ion-label>
  <ion-input type="password" [(ngModel)]="password"></ion-input>
</ion-item>

<ion-item>
  <ion-label>Tipo de usuario</ion-label>
  <ion-select [(ngModel)]="rol">
    <ion-select-option value="conductor">Conductor</ion-select-option>
    <ion-select-option value="ciudadano">Ciudadano</ion-select-option>
  </ion-select>
</ion-item>

<ion-button expand="full" (click)="login()">
Ingresar
</ion-button>

<ion-button expand="full" color="warning" (click)="loginBiometrico()">
Ingresar con biometría
</ion-button>

<ion-button fill="clear" routerLink="/registro">
Registrarse
</ion-button>

</ion-content>

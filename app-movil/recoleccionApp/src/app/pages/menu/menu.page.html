<ion-app>

  <!-- HEADER -->
  <ion-header>
    <ion-toolbar style="--background:#e91e63; --color:white;">
      <ion-title>Panel de Opciones</ion-title>
    </ion-toolbar>
  </ion-header>

  <!-- CONTENIDO -->
  <ion-content class="dashboard-content">

    <!-- TARJETA PRINCIPAL -->
    <ion-card class="welcome-card">

      <ion-card-header>
        <ion-card-title>
          <ion-icon name="car-outline"></ion-icon>
          Bienvenido
        </ion-card-title>

        <ion-card-subtitle>
          Gestión inteligente de recorridos
        </ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        Selecciona una opción para continuar.
      </ion-card-content>

    </ion-card>

    <!-- GRID DE OPCIONES -->
    <ion-grid>

      <ion-row>

        <ion-col size="6">
          <ion-button expand="block" class="btn-main" (click)="verPerfil()">
            <ion-icon slot="top" name="person-outline"></ion-icon>
            Perfil
          </ion-button>
        </ion-col>

        <ion-col size="6">
          <ion-button expand="block" class="btn-main" (click)="verMapa()">
            <ion-icon slot="top" name="map-outline"></ion-icon>
            Mapa
          </ion-button>
        </ion-col>

        <ion-col size="6">
          <ion-button expand="block" class="btn-main" (click)="historial()">
            <ion-icon slot="top" name="time-outline"></ion-icon>
            Historial
          </ion-button>
        </ion-col>

        <ion-col size="6">
          <ion-button expand="block" class="btn-main" (click)="reportes()">
            <ion-icon slot="top" name="alert-circle-outline"></ion-icon>
            Reportes
          </ion-button>
        </ion-col>

        <ion-col size="12">
          <ion-button expand="block" class="btn-secondary" (click)="configuracion()">
            <ion-icon slot="start" name="settings-outline"></ion-icon>
            Configuración
          </ion-button>
        </ion-col>

      </ion-row>

    </ion-grid>

  </ion-content>

</ion-app>

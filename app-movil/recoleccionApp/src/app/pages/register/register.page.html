<ion-header>
  <ion-toolbar class="main-toolbar">
    <ion-title>Crear cuenta</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="register-content">

  <!-- 🔥 WRAPPER CLAVE PARA CENTRAR -->
  <div class="form-wrapper">

    <!-- LOGO -->
    <div class="logo-container">
      <ion-icon name="person-add-outline"></ion-icon>
      <h1 class="app-title">Registro</h1>
      <p class="app-subtitle">Únete a Recolección App</p>
    </div>

    <!-- FORMULARIO -->
    <div class="form-card">

      <form [formGroup]="registerForm" (ngSubmit)="register()">

        <!-- NOMBRE -->
        <ion-item class="input-item"
          [class.error]="registerForm.get('nombre')?.invalid && registerForm.get('nombre')?.touched">

          <ion-icon name="person-outline" slot="start"></ion-icon>

          <ion-input
            label="Nombre completo"
            label-placement="floating"
            formControlName="nombre">
          </ion-input>

        </ion-item>

        <!-- DOCUMENTO -->
        <ion-item class="input-item"
          [class.error]="registerForm.get('documento')?.invalid && registerForm.get('documento')?.touched">

          <ion-icon name="card-outline" slot="start"></ion-icon>

          <ion-input
            label="Documento"
            label-placement="floating"
            formControlName="documento">
          </ion-input>

        </ion-item>

        <!-- TELEFONO -->
        <ion-item class="input-item"
          [class.error]="registerForm.get('telefono')?.invalid && registerForm.get('telefono')?.touched">

          <ion-icon name="call-outline" slot="start"></ion-icon>

          <ion-input
            label="Teléfono"
            label-placement="floating"
            formControlName="telefono"
            type="tel">
          </ion-input>

        </ion-item>

        <!-- EMAIL -->
        <ion-item class="input-item"
          [class.error]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">

          <ion-icon name="mail-outline" slot="start"></ion-icon>

          <ion-input
            label="Email"
            label-placement="floating"
            formControlName="email"
            type="email">
          </ion-input>

        </ion-item>

        <ion-note
          *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched"
          color="danger"
          class="error-message">
          Email inválido
        </ion-note>

        <!-- PASSWORD -->
        <ion-item class="input-item"
          [class.error]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">

          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>

          <ion-input
            type="password"
            label="Contraseña"
            label-placement="floating"
            formControlName="password">
          </ion-input>

        </ion-item>

        <ion-note
          *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched"
          color="danger"
          class="error-message">
          Mínimo 8 caracteres
        </ion-note>

        <!-- ROL -->
        <ion-item class="input-item"
          [class.error]="registerForm.get('rol')?.invalid && registerForm.get('rol')?.touched">

          <ion-icon name="people-outline" slot="start"></ion-icon>

          <ion-select
            label="Tipo de usuario"
            label-placement="floating"
            formControlName="rol">

            <ion-select-option value="ciudadano">
              👤 Ciudadano
            </ion-select-option>

            <ion-select-option value="conductor">
              🚛 Conductor
            </ion-select-option>

          </ion-select>

        </ion-item>

        <ion-note
          *ngIf="registerForm.get('rol')?.invalid && registerForm.get('rol')?.touched"
          color="danger"
          class="error-message">
          Selecciona un tipo de usuario
        </ion-note>

        <!-- BOTON -->
        <ion-button
          expand="block"
          type="submit"
          [disabled]="registerForm.invalid || isLoading"
          class="register-btn">

          <ion-spinner *ngIf="isLoading" name="crescent" slot="start"></ion-spinner>

          <ion-icon *ngIf="!isLoading" name="person-add-outline" slot="start"></ion-icon>

          {{ isLoading ? 'Registrando...' : 'Crear cuenta' }}

        </ion-button>

        <!-- LOGIN -->
        <ion-button
          expand="block"
          fill="clear"
          routerLink="/login"
          class="login-btn">

          <ion-icon name="log-in-outline" slot="start"></ion-icon>
          Ya tengo cuenta

        </ion-button>

      </form>

    </div>

  </div>

</ion-content>

<ion-header>
  <ion-toolbar style="--background:#e91e63; --color:white;">
    <ion-title>Configuración</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="settings-content ion-padding">

  <ion-card class="settings-card">

    <ion-card-header>
      <ion-card-title>Seguridad</ion-card-title>
    </ion-card-header>

    <ion-card-content>

      <ion-list>

        <ion-item>
          <ion-label>Activar biometría</ion-label>
          <ion-toggle (ionChange)="toggleBiometric($event)"></ion-toggle>
        </ion-item>

        <ion-item button (click)="goResetPassword()">
          <ion-label>Cambiar contraseña</ion-label>
        </ion-item>

      </ion-list>

    </ion-card-content>

  </ion-card>

  <ion-button expand="block" class="logout-btn" (click)="logout()">
    Cerrar sesión
  </ion-button>

</ion-content>

<ion-header>
  <ion-toolbar>
    <ion-title>Iniciar sesión</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-input
      label="Email"
      label-placement="floating"
      [(ngModel)]="email">
    </ion-input>
  </ion-item>

  <ion-item>
    <ion-input
      type="password"
      label="Contraseña"
      label-placement="floating"
      [(ngModel)]="password">
    </ion-input>
  </ion-item>

  <ion-button expand="block" (click)="login()">
    Iniciar sesión
  </ion-button>

  <ion-button expand="block" fill="clear" (click)="goToRegister()">
  Crear cuenta
</ion-button>
<ion-button fill="clear" (click)="goToForgotPassword()">
  ¿Olvidaste tu contraseña?
</ion-button>
</ion-content>

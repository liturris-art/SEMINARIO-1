<ion-header translucent="true">
  <ion-toolbar color="light">
    <ion-title>Iniciar sesión</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="login-content">

  <!-- Logo de la app -->
  <div class="logo-container">
    <ion-icon name="car-outline" class="logo-icon"></ion-icon>
    <h1 class="app-title">Bienvenido</h1>
    <p class="app-subtitle">Gestión inteligente de recorridos</p>
  </div>

  <!-- Formulario -->
  <form [formGroup]="loginForm" (ngSubmit)="login()" class="form-container">

    <ion-item class="input-item">
      <ion-input
        label="Correo electrónico"
        label-placement="floating"
        formControlName="email"
        type="email"
        [disabled]="isBlocked">
      </ion-input>
    </ion-item>

    <ion-note
      *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
      color="danger">
      Email inválido
    </ion-note>

    <ion-item class="input-item">
      <ion-input
        label="Contraseña"
        label-placement="floating"
        type="password"
        formControlName="password"
        [disabled]="isBlocked">
      </ion-input>
    </ion-item>

    <ion-note
      *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
      color="danger">
      Mínimo 6 caracteres
    </ion-note>

    <!-- Aviso de bloqueo -->
    <div *ngIf="isBlocked" class="block-notice">
      <ion-icon name="lock-closed"></ion-icon>
      <p>Cuenta bloqueada {{ blockTimeRemaining }}s</p>
    </div>

    <!-- Botón login -->
    <ion-button
      expand="block"
      type="submit"
      [disabled]="loginForm.invalid || isLoading || isBlocked"
      class="login-btn">

      <ion-spinner *ngIf="isLoading" slot="start"></ion-spinner>
      <ion-icon *ngIf="!isLoading" name="log-in-outline" slot="start"></ion-icon>

      {{ isLoading ? 'Ingresando...' : 'Iniciar sesión' }}

    </ion-button>

    <!-- Botones extra -->
    <div class="extra-buttons">

      <ion-button
        expand="block"
        fill="clear"
        (click)="goToRegister()"
        [disabled]="isBlocked">

        <ion-icon name="person-add-outline" slot="start"></ion-icon>
        Crear cuenta

      </ion-button>

      <ion-button
        expand="block"
        fill="clear"
        (click)="goToForgotPassword()"
        [disabled]="isBlocked">

        <ion-icon name="key-outline" slot="start"></ion-icon>
        Recuperar contraseña

      </ion-button>

    </div>

    <!-- Biometría -->
    <div *ngIf="biometricAvailable && !isBlocked" class="biometric-section">

      <p>O usa biometría</p>

      <ion-button
        expand="block"
        fill="outline"
        (click)="loginBiometric()"
        class="biometric-btn">

        <ion-icon name="finger-print-outline" slot="start"></ion-icon>
        Huella / Rostro

      </ion-button>

    </div>

  </form>

</ion-content>

<div class="vehiculos-container">

  <!-- HEADER -->
  <div class="header">
    <div>
      <h2 class="titulo">Registrar Vehículo</h2>
      <p class="subtitulo">Completa la información para añadir un nuevo vehículo al sistema</p>
    </div>
  </div>

  <!-- CARD FORMULARIO -->
  <div class="card form-card">
    <form class="form">

      <div class="form-grid">

        <!-- PLACA -->
        <label class="floating">
          <input 
            type="text"
            placeholder=" "
            id="placa"
            name="placa"
            [(ngModel)]="datos.placa"
            required>
          <span>Placa</span>
        </label>

        <!-- MARCA -->
        <label class="floating">
          <input 
            type="text"
            placeholder=" "
            id="marca"
            name="marca"
            [(ngModel)]="datos.marca">
          <span>Marca</span>
        </label>

        <!-- MODELO -->
        <label class="floating">
          <input 
            type="text"
            placeholder=" "
            id="modelo"
            name="modelo"
            [(ngModel)]="datos.modelo">
          <span>Modelo</span>
        </label>

      </div>

      <!-- BOTONES -->
      <div class="form-actions">
        <button 
          type="button" 
          class="btn primary"
          (click)="registroVehiculo()">
          Registrar Vehículo
        </button>

        <button 
          type="button" 
          class="btn secondary"
          (click)="volverLista()">
          Volver a la Lista
        </button>
      </div>

    </form>
  </div>

  <!-- MODAL ÉXITO -->
  <div class="modal-overlay" *ngIf="modalSuccessVisible">
    <div class="modal success">
      <h3>Vehículo registrado correctamente</h3>
      <p>El vehículo se ha guardado en el sistema.</p>
      <button class="btn ok" (click)="cerrarSuccess()">Aceptar</button>
    </div>
  </div>

  <!-- MODAL ERROR -->
  <div class="modal-overlay" *ngIf="modalErrorVisible">
    <div class="modal error">
      <h3>Error al registrar</h3>
      <p>{{ errorMensaje }}</p>
      <button class="btn cancel" (click)="cerrarError()">Cerrar</button>
    </div>
  </div>

</div>
